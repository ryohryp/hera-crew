# Task definitions for HERA workflow
# 3役分離構成 (Thinker=qwen2.5-coder:14b / Critic=qwen3:8b / Manager=deepseek-r1:14b)
# 各役のモデル特性に合わせて指示の抽象度・出力形式を最適化する

task_decomposition:
  # Thinker (qwen2.5-coder:14b) — コード特化モデルなので
  # 技術的かつ構造化された分解を強く要求する
  description: >-
    ユーザーのリクエスト: "{user_request}" を分析し、以下のルールで応答してください。

    【早期終了 (SIMPLE) ルール】
    以下の **すべて** を満たす場合のみ、応答の1行目を "SIMPLE:" で始めて直接回答を返す。

    SIMPLE で返してよい条件 (すべて必須):
    - リクエスト本文が 50 文字以内
    - 50 文字以内・1〜2 文の自然な日本語で完結に答えられる
    - 単一の挨拶 / 単一の事実確認 / 単一の自己紹介要求のいずれか

    SIMPLE で返してはいけない条件 (1つでも該当したら必ず通常分解):
    - リクエストが 50 文字を超える
    - "実装" / "作成" / "書いて" / "ファイル" / "コード" / "スクリプト" /
      "API" / "クラス" / "関数" / "テスト" のいずれかが含まれる
    - 番号付きリスト ("1. ..." "2. ...") や "要件:" "構成:" など
      複数項目の構造が含まれる
    - ディレクトリ名・ファイル名が指定されている
    - 期待する成果物が複数 (例: コード本体 + テスト + 設定)

    SIMPLE で良い例 (すべて 50 字以内 / 1 文応答):
      入力: "Hello"
      出力: SIMPLE: こんにちは。HERAパイプラインは正常に動作しています。

      入力: "1+1は?"
      出力: SIMPLE: 2 です。

      入力: "あなたは誰?"
      出力: SIMPLE: HERA Crew です。マルチエージェントAIシステムとして動作しています。

    SIMPLE で返してはいけない例 (必ず通常分解):
      入力: "FastAPIでJWT認証付きAPIを実装してください..."   → 通常分解 (実装+ファイル)
      入力: "Pythonで素数判定関数を書いて"                  → 通常分解 ("書いて"+コード)
      入力: "test_app.py を作成し以下の要件で..."            → 通常分解 (ファイル+要件)
      入力: "1. クラスを作る 2. テストを書く"              → 通常分解 (番号付きリスト)

    【通常分解ルール】
    SIMPLE 条件を満たさない場合は、独立して実行可能なサブタスクに分解してください。
    各サブタスクには以下のメタ情報を必ず付けること:
      1. ID (T1, T2, ...)
      2. 目的 (1〜2文で簡潔に)
      3. 入力 / 出力 (期待する成果物の形式: コード, 設計書, 検証結果 など)
      4. 推定難易度 (LOW / MEDIUM / HIGH)
      5. 依存関係 (依存する他タスクのIDがあれば列挙)
    曖昧な抽象的タスクは作らず、ローカルLLMでも実行できる粒度まで具体化してください。
  expected_output: >-
    早期終了の場合: 1行目が "SIMPLE:" で始まる短い直接回答。
    通常分解の場合: 各サブタスクをID/目的/入力/出力/難易度/依存関係の項目で
    構造化したテクニカル・マニフェスト (Markdownの番号付きリスト形式)。すべて日本語。
  agent: thinker

logic_evaluation:
  # Critic (qwen3:8b) — 軽量モデル。判断基準を明確に固定し、短い出力を要求
  description: >-
    前ステップで生成されたサブタスクのマニフェストをレビューし、各タスクが
    ローカルLLM (14B〜35B級) で信頼性高く解決できるかを評価してください。
    評価観点は以下の3つに限定する:
      A. 複雑度: タスクの論理ステップ数 / 入出力の複雑さ
      B. 知識依存度: 専用ドメイン知識・最新情報・大規模コンテキストへの依存
      C. ツール依存度: 外部システム・APIアクセスの必要性
    各サブタスクに対して、最終ルーティング判定 [LOCAL / FALLBACK] を必ず1つ付けること。
    FALLBACK判定の場合のみ、Antigravity (上位LLM) への委譲が許可される。
  expected_output: >-
    日本語で記述された、各サブタスクIDごとの評価表 (複雑度/知識依存度/ツール依存度/最終判定/理由)。
    出力はMarkdownの表形式で簡潔に。冗長な前置きは禁止。
  agent: critic

execution_routing:
  # Manager (qwen3.6:35B-A3B MoE) — 深い判断と道具使用を担当
  description: >-
    Critic のルーティング判定に従って、サブタスクを実行する。
    実行ルール:
      - LOCAL 判定のタスク: あなた (Manager) 自身が直接実行し、結果を生成する。
      - FALLBACK 判定のタスク: 必要に応じて antigravity_delegate_tool を呼び出し、
        上位LLMに委譲する。委譲時はサブタスクの目的・入力・期待される出力形式を
        明確に記述したプロンプトを渡すこと。
    すべてのサブタスクの結果を統合した実行レポートを最終的に生成する。
    ツール呼び出しは最小限に抑え、LOCAL で完結できるものは委譲しないこと。
  expected_output: >-
    各サブタスクIDごとの実行結果 (生成コード / 設計内容 / 解析結果) と、
    実行ルート (LOCAL or FALLBACK) を併記した日本語レポート。
  agent: manager

final_verification:
  # Manager — 全体整合性レビュー
  description: >-
    リクエスト: "{user_request}" に対する実行結果全体をレビューし、以下を確認する:
      1. すべてのサブタスクが完了しているか
      2. 出力同士に矛盾や重複がないか
      3. ユーザーの当初のリクエストを満たしているか
      4. HERA戦略 (LOCAL優先 / 必要時のみFALLBACK) が遵守されたか
    不足や問題があれば明示し、なければ完了宣言を行う。
  expected_output: >-
    日本語の最終ステータスレポート。
    形式:
      ## サマリー
      ## 各サブタスクの完了状況
      ## 検出された問題と対応
      ## 最終成果物
  agent: manager
