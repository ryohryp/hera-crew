# Task definitions for HERA workflow

task_decomposition:
  description: >-
    ユーザーのリクエスト: "{user_request}" を詳細なサブタスクに分解してください。
    各サブタスクは、小規模なモデルでも理解できる技術的な指示（マニフェスト）である必要があります。
  expected_output: >-
    日本語で記述された、具体的で実行可能なサブタスクのリスト（テクニカル・マニフェスト形式）。
  agent: thinker

logic_evaluation:
  description: >-
    前段階のタスク出力で提供されたサブタスクが、Gemma 3 によってローカルで高い信頼性を持って解決できるかどうかを評価してください。
    これまでのステップのマニフェストを確認し、複雑さと発散の可能性を評価します。
  expected_output: >-
    各サブタスクに対するルーティング推奨事項（LOCAL または FALLBACK）とその理由（日本語）。
  agent: critic

execution_routing:
  description: >-
    HERAルーティングロジックに基づいて、割り当てられたサブタスクを実行します。
    LOCALが推奨された場合はThinkerが処理し、FALLBACKが推奨された場合や「後半」段階のタスクはManagerが引き継ぎます。
    タスクが非常に複雑な場合、ManagerはさらにAntigravityに委譲することができます。
    前のステップのサブタスクとルーティング推奨事項を確認し、それに応じて実行してください。
  expected_output: >-
    特定のサブタスクに対する技術的な結果またはコード、およびその日本語による解説。
  agent: thinker

final_verification:
  description: >-
    リクエスト: "{user_request}" に対するプロジェクト全体の出力をレビューしてください。
    すべてのサブタスクが統合され、HERA戦略が遵守されていることを確認します。
  expected_output: >-
    最終的なステータスレポートと、完成したコードベースまたはドキュメント（すべて自然な日本語）。
  agent: manager
